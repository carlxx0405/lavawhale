<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pleiad Marketing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="hero-shell">
        <nav class="site-nav">
            <div class="nav-inner">
                <img src="logo.png" alt="Pleiad Marketing" class="nav-logo">
                <button class="nav-button">Menu</button>
            </div>
        </nav>

        <section class="hero">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <div class="hero-captions">
                    <p class="hero-caption">Preemptive Marketing,</p>
                    <p class="hero-caption">Fostering Sustainable Business Growth,</p>
                    <p class="hero-caption">Enriching Customer Experience.</p>
                </div>

                <div class="hero-copy-wrap">
                    <h1>We don't chase attention. We align it.</h1>
                    <a class="hero-cta" href="#contact">Start the conversation</a>
                </div>
            </div>
        </section>
    </header>
</body>
</html>
